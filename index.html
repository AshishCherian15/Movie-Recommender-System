<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .search-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 15px 25px;
            font-size: 1rem;
            border: 2px solid #667eea;
            border-radius: 10px;
        }

        select {
            flex: 1;
            background: white;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .selected-movie {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .selected-movie.active {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .selected-movie img {
            width: 120px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .selected-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .selected-info p {
            color: #666;
            margin: 5px 0;
        }

        .recommendations-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .movie-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.3);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .movie-genre {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .similarity-badge {
            display: inline-block;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .movie-card {
            position: relative;
        }

        .no-recommendations {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1.2rem;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Movie Recommender System</h1>
        <p class="subtitle">Content-Based Filtering using TF-IDF and Cosine Similarity</p>

        <div class="search-section">
            <h2 style="margin-bottom: 20px; color: #333;">Select a Movie</h2>
            <div class="search-box">
                <select id="movieSelect">
                    <option value="">Choose a movie...</option>
                </select>
                <button onclick="getRecommendations()">Get Recommendations</button>
            </div>

            <div id="selectedMovie" class="selected-movie">
                <img id="selectedPoster" src="" alt="Movie Poster">
                <div class="selected-info">
                    <h3 id="selectedTitle"></h3>
                    <p id="selectedGenre"></p>
                    <p id="selectedOverview"></p>
                </div>
            </div>
        </div>

        <div class="recommendations-section" id="recommendationsSection" style="display: none;">
            <h2 class="section-title">Recommended Movies</h2>
            <div id="moviesGrid" class="movies-grid"></div>
        </div>

        <div class="footer">
            <p>Built with Python • TF-IDF Vectorization • Cosine Similarity</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">Content-Based Movie Recommender System Assignment</p>
        </div>
    </div>

            },
            {
                id: 24, title: 'Frozen', genre: 'Animation, Family, Musical',
                overview: 'A fearless princess teams up with a rugged iceman to find her sister whose icy powers have trapped the kingdom in eternal winter.',

            },
            {
                id: 25, title: 'Moana', genre: 'Animation, Family, Adventure',
                overview: 'A spirited teenager sails out on a daring mission to save her people guided by the ocean and a legendary demigod.',
                poster: 'https://image.tmdb.org/t/p/w500/4JeejGugONWpJkbnvL12hVoYEDa.jpg'
            }
        ];

        // Precomputed recommendations (from Python cosine similarity)
        const recommendations = {
            'The Avengers': [
                {title: 'Iron Man', genre: 'Action, Superhero, Sci-Fi', poster: 'https://image.tmdb.org/t/p/w500/78lPtwv72eTNqFW9COBYI0dWDJa.jpg', score: 0.52},
                {title: 'Captain America', genre: 'Action, Superhero, War', poster: 'https://image.tmdb.org/t/p/w500/vSNxAJTlD0r02V9sPYpOjqDZXUK.jpg', score: 0.51},
                {title: 'Thor', genre: 'Action, Superhero, Fantasy', poster: 'https://image.tmdb.org/t/p/w500/prSfAi1xGrhLQNxVSUFh61xQ4Qy.jpg', score: 0.48},
                {title: 'Black Widow', genre: 'Action, Spy, Thriller', poster: 'https://image.tmdb.org/t/p/w500/qAZ0pzat24kLdO3o8ejmbLxyOac.jpg', score: 0.38},
                {title: 'The Dark Knight', genre: 'Action, Crime, Thriller', poster: 'https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg', score: 0.35}
            ],
            'Titanic': [
                {title: 'The Notebook', genre: 'Romance, Drama', poster: 'https://image.tmdb.org/t/p/w500/rNzQyW4f8B8cQeg7Dgj3n6eT5k9.jpg', score: 0.58},

                {title: 'Pride and Prejudice', genre: 'Romance, Drama, Period', poster: 'https://image.tmdb.org/t/p/w500/sGjIvtVvTlWnia2zfJfHz81pZ9Q.jpg', score: 0.49},
                {title: 'Romeo and Juliet', genre: 'Romance, Drama, Tragedy', poster: 'https://image.tmdb.org/t/p/w500/xBKGJQsAIeweesB79KC89FpBrVr.jpg', score: 0.47},
                {title: 'The Godfather', genre: 'Crime, Drama, Mafia', poster: 'https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg', score: 0.32}
            ],
            'Inception': [
                {title: 'Interstellar', genre: 'Sci-Fi, Drama, Adventure', poster: 'https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg', score: 0.48},
                {title: 'The Matrix', genre: 'Sci-Fi, Action, Cyberpunk', poster: 'https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg', score: 0.45},
                {title: 'Blade Runner 2049', genre: 'Sci-Fi, Mystery, Thriller', poster: 'https://image.tmdb.org/t/p/w500/gajva2L0rPYkEWjzgFlBXCAVBE5.jpg', score: 0.43},

                {title: 'The Avengers', genre: 'Action, Superhero, Adventure', poster: 'https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg', score: 0.35}
            ]
        };

        // Populate movie select
        const select = document.getElementById('movieSelect');
        movies.forEach(movie => {
            const option = document.createElement('option');
            option.value = movie.title;
            option.textContent = movie.title;
            select.appendChild(option);
        });

        function getRecommendations() {
            const selectedTitle = document.getElementById('movieSelect').value;
            if (!selectedTitle) {
                alert('Please select a movie first!');
                return;
            }

            const movie = movies.find(m => m.title === selectedTitle);
            
            // Show selected movie
            document.getElementById('selectedMovie').classList.add('active');
            document.getElementById('selectedPoster').src = movie.poster;
            document.getElementById('selectedTitle').textContent = movie.title;
            document.getElementById('selectedGenre').textContent = `Genre: ${movie.genre}`;
            document.getElementById('selectedOverview').textContent = movie.overview;

            // Show recommendations
            const recsSection = document.getElementById('recommendationsSection');
            const grid = document.getElementById('moviesGrid');
            
            recsSection.style.display = 'block';
            grid.innerHTML = '';

            const recs = recommendations[selectedTitle] || [];
            
            if (recs.length === 0) {
                grid.innerHTML = '<div class="no-recommendations">No recommendations available for this movie yet.</div>';
                return;
            }

            recs.forEach((rec, index) => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="rank-badge">#${index + 1}</div>
                    <img src="${rec.poster}" alt="${rec.title}">
                    <div class="movie-info">
                        <div class="movie-title">${rec.title}</div>
                        <div class="movie-genre">${rec.genre}</div>
                        <span class="similarity-badge">${(rec.score * 100).toFixed(1)}% Match</span>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Scroll to recommendations
            recsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

</body>
</html>
